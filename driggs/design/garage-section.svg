<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dim" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,1 L8,7 Z" fill="#5f6b70"/>
    </marker>
    <marker id="v" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7a4b12"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="620" height="400" fill="#fbfaf7"/>

  <text x="24" y="30" font-size="17" font-weight="700" fill="#2f5b45">Garage — east–west section</text>
  <text x="24" y="48" font-size="11" fill="#5f6b70">Shed roof high on the east, low on the west (matches the others). Doors on the low west side, facing the driveway.</text>

  <!-- ground -->
  <line x1="60" y1="300" x2="560" y2="300" stroke="#8a7d5f" stroke-width="2.5"/>
  <rect x="60" y="300" width="500" height="10" fill="#efe9dc"/>

  <!-- roof (slopes up to east) + overhangs -->
  <polygon points="88,163 520,109 520,116 110,171" fill="#6b5b3e"/>
  <line x1="88" y1="163" x2="520" y2="109" stroke="#4a3f2a" stroke-width="1"/>
  <text x="300" y="122" font-size="10.5" font-weight="700" fill="#4a3f2a" transform="rotate(-7,300,122)">low-slope shed roof · ~1.5:12</text>

  <!-- walls -->
  <line x1="110" y1="300" x2="110" y2="160" stroke="#3a3324" stroke-width="3"/>   <!-- west (low) -->
  <line x1="474" y1="300" x2="474" y2="115" stroke="#3a3324" stroke-width="3"/>   <!-- east (tall) -->

  <!-- east clerestory glass -->
  <rect x="468" y="128" width="6" height="120" fill="#bcd8e6" stroke="#7ba3b8" stroke-width="1"/>
  <text x="486" y="150" font-size="10" fill="#5f89a0">east clerestory /</text>
  <text x="486" y="163" font-size="10" fill="#5f89a0">shop glass (matches</text>
  <text x="486" y="176" font-size="10" fill="#5f89a0">the view walls)</text>

  <!-- deep east overhang note -->
  <text x="430" y="100" font-size="9.5" fill="#6b5b3e">deep overhang →</text>

  <!-- garage door on west wall -->
  <rect x="106" y="188" width="9" height="112" fill="#c9bfa8" stroke="#6b5b3e" stroke-width="1.5"/>
  <line x1="110" y1="188" x2="110" y2="300" stroke="#8a5a20" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- door track slides back into rising headroom -->
  <path d="M 116,190 L 300,168 L 452,150" fill="none" stroke="#b07f2e" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="250" y="184" font-size="9" fill="#b07f2e" transform="rotate(-6,250,184)">door track runs back into MORE headroom →</text>

  <!-- truck silhouette -->
  <g fill="#d8cdba" stroke="#9a8f76" stroke-width="1.2">
    <path d="M150,300 L150,258 L182,258 L196,236 L300,236 L300,258 L420,258 L420,300 Z"/>
  </g>
  <circle cx="188" cy="300" r="15" fill="#5f5747" stroke="#3a3324" stroke-width="2"/>
  <circle cx="392" cy="300" r="15" fill="#5f5747" stroke="#3a3324" stroke-width="2"/>
  <text x="285" y="285" font-size="9.5" fill="#7a705a" text-anchor="middle">full-size truck / SUV bay</text>

  <!-- ============ dimensions ============ -->
  <!-- door height -->
  <line x1="132" y1="188" x2="132" y2="300" stroke="#5f6b70" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="137" y="248" font-size="10.5" font-weight="700" fill="#3a3324">8 ft door</text>
  <text x="137" y="261" font-size="9" fill="#5f6b70">(9–10 ft if you</text>
  <text x="137" y="272" font-size="9" fill="#5f6b70">raise the eave)</text>

  <!-- west eave height -->
  <line x1="86" y1="163" x2="86" y2="300" stroke="#2b5f7e" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="80" y="235" font-size="10" font-weight="700" fill="#2b5f7e" text-anchor="end">west eave</text>
  <text x="80" y="248" font-size="10" font-weight="700" fill="#2b5f7e" text-anchor="end">≈10 ft</text>

  <!-- east eave height -->
  <line x1="498" y1="115" x2="498" y2="300" stroke="#2b5f7e" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="504" y="210" font-size="10" font-weight="700" fill="#2b5f7e">east eave</text>
  <text x="504" y="223" font-size="10" font-weight="700" fill="#2b5f7e">≈13 ft</text>

  <!-- depth -->
  <line x1="110" y1="330" x2="474" y2="330" stroke="#5f6b70" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="292" y="345" font-size="10.5" font-weight="700" fill="#3a3324" text-anchor="middle">≈26 ft deep</text>

  <!-- header callout -->
  <line x1="150" y1="188" x2="230" y2="150" stroke="#8a8372" stroke-width="0.8"/>
  <text x="232" y="148" font-size="9" fill="#5f6b70">only ~1–1.5 ft header needed with a</text>
  <text x="232" y="159" font-size="9" fill="#5f6b70">side-mount (jackshaft) opener</text>

  <!-- orientation labels -->
  <text x="110" y="372" font-size="11" font-weight="700" fill="#6b5b3e" text-anchor="middle">WEST</text>
  <text x="110" y="386" font-size="9" fill="#8a8372" text-anchor="middle">driveway · 3 doors</text>
  <text x="474" y="372" font-size="11" font-weight="700" fill="#7a4b12" text-anchor="middle">EAST</text>
  <text x="474" y="386" font-size="9" fill="#8a8372" text-anchor="middle">view side</text>
  <line x1="150" y1="368" x2="434" y2="368" stroke="#c9c3b4" stroke-width="1" stroke-dasharray="2 3"/>
</svg>
