<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="wet" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#9cc4d6" stroke-width="1.4"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f5b45"/>
    </marker>
    <marker id="arrowE" markerWidth="14" markerHeight="14" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#7a4b12"/>
    </marker>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a"/><stop offset="55%" stop-color="#e8892b"/><stop offset="100%" stop-color="#b4531a"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="980" height="720" fill="#fbfaf7"/>

  <text x="30" y="36" font-size="21" font-weight="700" fill="#2f5b45">Crossed Arrows Lot 3 — Rough Site Plan (rev. 2)</text>
  <text x="30" y="56" font-size="12" fill="#5f6b70">Three buildings toed inward to a shared focal point ~½ mile east · sightlines converge · fire-pit amphitheater in the foreground</text>

  <!-- lot boundary -->
  <rect x="70" y="78" width="840" height="592" fill="#f3f1ea" stroke="#c9c3b4" stroke-width="1.5" stroke-dasharray="2 4"/>
  <text x="80" y="96" font-size="10.5" fill="#9a927f">~23.85-acre lot boundary (approx.)</text>

  <!-- west road -->
  <line x1="70" y1="78" x2="70" y2="670" stroke="#8a8372" stroke-width="4"/>
  <text x="46" y="380" font-size="12" fill="#5f6b70" transform="rotate(-90,46,380)">N 3000 W · road / access (WEST)</text>

  <!-- east wetland buffer + view -->
  <rect x="852" y="78" width="58" height="592" fill="url(#wet)" opacity="0.8"/>
  <rect x="852" y="78" width="58" height="592" fill="none" stroke="#9cc4d6" stroke-width="1"/>
  <text x="881" y="360" font-size="10.5" fill="#5f89a0" transform="rotate(-90,881,360)">wetland / NRO buffer — keep buildings ≥100 ft back</text>

  <!-- north arrow -->
  <g transform="translate(905,116)">
    <line x1="0" y1="26" x2="0" y2="-6" stroke="#2f5b45" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="-4" y="42" font-size="12" font-weight="700" fill="#2f5b45">N</text>
  </g>

  <!-- converging sightlines to a shared focal point east -->
  <g stroke="#b98a3c" stroke-width="1.3" stroke-dasharray="6 5" fill="none">
    <line x1="426" y1="360" x2="772" y2="360"/>
    <line x1="452" y1="243" x2="772" y2="360"/>
    <line x1="452" y1="477" x2="772" y2="360"/>
  </g>
  <circle cx="772" cy="360" r="6" fill="none" stroke="#b98a3c" stroke-width="1.6"/>
  <circle cx="772" cy="360" r="2" fill="#b98a3c"/>
  <text x="700" y="343" font-size="10.5" font-weight="700" fill="#b07f2e">shared focal point</text>
  <text x="700" y="356" font-size="9.5" fill="#b07f2e">≈ ½ mile east (schematic —</text>
  <text x="700" y="368" font-size="9.5" fill="#b07f2e">true point is off-frame)</text>

  <!-- Teton view arrow -->
  <line x1="792" y1="300" x2="845" y2="300" stroke="#7a4b12" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <text x="792" y="290" font-size="13" font-weight="700" fill="#7a4b12">TETONS · VIEW + SUNRISE →</text>

  <!-- ============ BUILDINGS: gentle concave-east arc, toed INWARD ============ -->
  <!-- east glass = amber edge on the mountain side -->

  <!-- MAIN HOUSE (center, faces due east, set slightly west) -->
  <g>
    <rect x="404" y="320" width="22" height="80" fill="#d8cdba" stroke="#6b5b3e" stroke-width="1.5"/>
    <line x1="426" y1="320" x2="426" y2="400" stroke="#c98a2e" stroke-width="5"/>
    <text x="415" y="356" font-size="10.5" font-weight="700" fill="#3a3324" text-anchor="middle">MAIN</text>
    <text x="415" y="369" font-size="10.5" font-weight="700" fill="#3a3324" text-anchor="middle">HOUSE</text>
    <text x="415" y="383" font-size="8.5" fill="#5f6b70" text-anchor="middle">3,500 sf</text>
  </g>

  <!-- GARAGE / SHOP (north end, rotated CLOCKWISE +7° → faces east-southeast, inward) -->
  <g transform="rotate(7,440,240)">
    <rect x="428" y="222" width="24" height="36" fill="#d8cdba" stroke="#6b5b3e" stroke-width="1.5"/>
    <line x1="452" y1="222" x2="452" y2="258" stroke="#c98a2e" stroke-width="4.5"/>
    <text x="440" y="238" font-size="9.5" font-weight="700" fill="#3a3324" text-anchor="middle">GARAGE</text>
    <text x="440" y="250" font-size="8" fill="#5f6b70" text-anchor="middle">3-car · 800 sf</text>
  </g>

  <!-- BUNKHOUSE (south end, rotated COUNTER-CW -7° → faces east-northeast, inward) -->
  <g transform="rotate(-7,440,480)">
    <rect x="424" y="450" width="28" height="60" fill="#d8cdba" stroke="#6b5b3e" stroke-width="1.5"/>
    <line x1="452" y1="450" x2="452" y2="510" stroke="#c98a2e" stroke-width="4.5"/>
    <text x="438" y="476" font-size="9.5" font-weight="700" fill="#3a3324" text-anchor="middle">BUNKHOUSE</text>
    <text x="438" y="489" font-size="8" fill="#5f6b70" text-anchor="middle">2-bed · 1,500 sf</text>
  </g>

  <text x="470" y="305" font-size="9.5" font-weight="700" fill="#c98a2e">▮ full-height east glass (view wall)</text>
  <text x="300" y="540" font-size="9.5" fill="#6b5b3e">minimalist Cor-Ten / wood entries face WEST ▸</text>
  <text x="300" y="554" font-size="9" fill="#8a8372">each building rotated a few ° to aim at the shared focal point</text>

  <!-- ============ FIRE PIT + STONE BENCH AMPHITHEATER (tighter arc, opens east) ============ -->
  <!-- bench: concave-east C wrapping the west of the fire, people face east toward fire + view -->
  <path d="M 566,318 Q 512,360 566,402" fill="none" stroke="#9b9384" stroke-width="9" stroke-linecap="round"/>
  <path d="M 566,318 Q 512,360 566,402" fill="none" stroke="#b8b1a2" stroke-width="3" stroke-linecap="round"/>
  <circle cx="576" cy="360" r="11" fill="url(#fire)" stroke="#7a3d12" stroke-width="1.5"/>
  <circle cx="576" cy="360" r="17" fill="none" stroke="#9b9384" stroke-width="2" stroke-dasharray="2 3"/>
  <text x="545" y="300" font-size="10.5" font-weight="700" fill="#8a5a20" text-anchor="middle">fire pit + stone benches</text>
  <text x="545" y="312" font-size="9" fill="#8a8372" text-anchor="middle">tighter arc, opens east to fire + view</text>

  <!-- driveway + motor court (west) -->
  <path d="M 70,470 C 190,452 300,410 372,376" fill="none" stroke="#a99b7d" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="378" cy="370" rx="30" ry="22" fill="none" stroke="#a99b7d" stroke-width="3" stroke-dasharray="3 3"/>
  <text x="150" y="443" font-size="10" fill="#8a8372">gravel drive</text>
  <text x="345" y="410" font-size="9.5" fill="#8a8372">motor court</text>

  <!-- well + septic -->
  <circle cx="405" cy="250" r="7" fill="#ffffff" stroke="#2b5f7e" stroke-width="1.6"/>
  <text x="405" y="254" font-size="8.5" font-weight="700" fill="#2b5f7e" text-anchor="middle">W</text>
  <text x="416" y="248" font-size="9" fill="#2b5f7e">well</text>
  <rect x="200" y="150" width="120" height="58" fill="none" stroke="#7a8a3a" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="260" y="174" font-size="9.5" fill="#5f6f28" text-anchor="middle">septic drainfield</text>
  <text x="260" y="188" font-size="8.5" fill="#7a8a3a" text-anchor="middle">(siting TBD — EIPH test holes)</text>

  <!-- pasture note -->
  <text x="150" y="600" font-size="11" fill="#8a9270" font-style="italic">open pasture — keep in qualifying ag use (grazing/hay lease)</text>
  <text x="150" y="615" font-size="11" fill="#8a9270" font-style="italic">to retain ag tax valuation on the balance of the acreage</text>

  <!-- scale bar -->
  <g transform="translate(700,650)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#5f6b70" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#5f6b70" stroke-width="2"/>
    <line x1="100" y1="-4" x2="100" y2="4" stroke="#5f6b70" stroke-width="2"/>
    <text x="50" y="16" font-size="10" fill="#5f6b70" text-anchor="middle">~200 ft (buildings only; focal pt not to scale)</text>
  </g>
</svg>
