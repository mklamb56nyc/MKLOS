name: Auto-merge Claude PRs
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: write
  pull-requests: write
jobs:
  automerge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Check for site/ changes
        id: site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          FILES=$(gh pr diff "$PR" --name-only --repo "$REPO")
          if echo "$FILES" | grep -q '^site/'; then
            echo "touches_site=true" >> "$GITHUB_OUTPUT"
            echo "PR touches site/ — leaving open for review."
          else
            echo "touches_site=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Auto-merge (non-site PRs only)
        if: steps.site.outputs.touches_site == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3 4 5 6; do
            if gh pr merge "$PR" --squash --delete-branch --repo "$REPO"; then
              echo "Merged."; exit 0
            fi
            echo "Not mergeable yet; retrying in 10s..."
            sleep 10
          done
          echo "Could not merge after retries."; exit 1
